<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restaurant Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🥘 Indigo Menu</h1>


  <select id="categoryFilter">
    <option value="all">All</option>
    <option value="food">Food</option>
    <option value="drink">Drinks</option>
  </select>

  
  <div id="menu">

    <div class="item" data-category="food" data-price="10">
      <h3>Naan</h3>
      <p>10$</p>
      <button class="addBtn">Add to Cart</button>
    </div>

    <div class="item" data-category="food" data-price="8">
      <h3>Butter Chicken</h3>
      <p>22$ </p>
      <button class="addBtn">Add to Cart</button>
    </div>

    <div class="item" data-category="drink" data-price="5">
      <h3>Mango Lassi</h3>
      <p>8$</p>
      <button class="addBtn">Add to Cart</button>
    </div>

  </div>

  <h2>🛒 Cart</h2>
  <ul id="cart"></ul>
  <p>Total: $<span id="total">0</span></p>

  <script src="vanillascript.js"></script>
</body>
</html>
