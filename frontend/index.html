<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Indigo Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header>
    <h1>🥘 Indigo Menu</h1>
    <button id="themeToggle">🌙</button>
    <button id="roleToggle">Switch Role</button>
    <span id="currentRole"></span>
  </header>

  <div class="controls">
    <label>Filter:</label>
    <select id="categoryFilter"></select>
  </div>

  <!-- ADD ITEM -->
  <form id="addItemForm">
  <input id="name" placeholder="Name" required>
  <input id="price" type="number" step="0.01" placeholder="Price" required>
  
  <select id="addItemCategory" required>
    <option value="" disabled selected>Select Category</option>
  </select>
  
  <button type="submit">Add Item</button>
</form>

  <!-- ADD CATEGORY -->
  <form id="addCategoryForm">
    <input id="newCategory" placeholder="New Category" required>
    <button type="submit">Add Category</button>
  </form>

  <div id="menu" class="grid"></div>

  <div class="cart-box">
    <h2>🛒 Cart</h2>
    <ul id="cart"></ul>
    <p>Total: $<span id="total">0</span></p>
  </div>

</div>

<script src="vanillascript.js"></script>
</body>
</html>
